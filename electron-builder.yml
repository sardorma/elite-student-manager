appId: com.elite.studentmanager
productName: Elite Student Manager
copyright: Copyright © 2025

directories:
  output: release

files:
  - dist/**/*
  - electron/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: EliteStudentManager-Setup-${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Elite Student Manager
  installerHeaderIcon: electron/icon.ico
  uninstallDisplayName: Elite Student Manager

publish:
  provider: github
  releaseType: release
